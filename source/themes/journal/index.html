{% extends "base.html" %}

{% block content %}
    {% for title, root in data.items() %}
    <article class="post-item">
        <h2 class="post-title">
            <a href="{{ root[0].url }}">{{ title }}</a>
        </h2>
        <div class="post-meta">
            <span class="post-date">[{{root[0].date}}]</span>
            <a href="{{root[0].category}}.html" class="post-category">{{root[0].category}}</a>
        </div>
    </article>
    {% endfor %}

 {% endblock %}
