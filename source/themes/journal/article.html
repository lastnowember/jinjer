
{% extends "base.html" %}

{% block content %}
    <header class="article-header">
        <h1>{{ title }}</h1>
        <div class="article-meta">
            <span class="article-date">[{{date}}]</span>
            <a href="{{category}}.html" class="article-category">{{category}}</a>
        </div>
    </header>
            
    <article class="article-content">
            {% set wrapped_text = text|replace('<img ', '<div class="article-main-image"><img ') %}
            {{ wrapped_text|replace('</img>', '</img></div>')|replace('/>', '/></div>')|safe }}
            {{ text }}
    </article>
    
{% endblock %}
