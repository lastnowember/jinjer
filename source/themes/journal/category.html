{% extends "base.html" %}

{% block content %}
    <header class="category-header">
        <h2 class="category-title">{{ category }}</h2>
    </header>

    <div class="post-list">
        {% for title, root in data.items() %}
            <article class="post-item">
            <h2 class="post-title">
                <a href="{{ root[0].url }}">{{ title }}</a>
            </h2>
            <div class="post-meta">
                <span class="post-date">[{{root[0].date}}]</span>
            </div>
        </article>
        {% endfor %}
    </div>
 {% endblock %}
